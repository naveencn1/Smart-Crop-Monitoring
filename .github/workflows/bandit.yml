name: Python Static Security Analysis

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit openpyxl

      - name: Run Bandit Security Scan & Generate Report
        run: |
          python tests/security_report.py

      - name: Upload Excel Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-static-security-report
          path: tests/excel/Security_Scan_Report.xlsx
          retention-days: 14



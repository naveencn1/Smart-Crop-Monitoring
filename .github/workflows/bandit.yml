name: Python Static Security Analysis

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit Security Scan
        # Scans the backend and tests directories for security issues
        # -r: recursive
        # -ll: report medium and high severity findings
        # -q: quiet mode (minimal output)
        # --format custom: use custom message formatting
        # --msg-template: suppress filename by printing line number, rule, severity and description
        run: |
          bandit -r backend/ tests/ -ll -q --format custom --msg-template "{line}: {test_id}[{severity}]: {msg}"


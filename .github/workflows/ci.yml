name: 🔄 Continuous Integration - Quick Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    name: Lint & Format Check

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📥 Install Dependencies
        working-directory: mobile-e2e
        run: npm ci

      - name: ✅ Validate Test Files
        working-directory: mobile-e2e
        run: |
          echo "Validating JavaScript syntax..."
          if [ -d "tests" ]; then
            for file in tests/*.test.js; do
              if [ -f "$file" ]; then
                echo "Checking: $file"
                node -c "$file" || exit 1
              fi
            done
            echo "✅ All test files have valid syntax"
          else
            echo "⚠️ Tests directory not found"
          fi

  security-scan:
    runs-on: ubuntu-latest
    name: Security Vulnerability Scan

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 🔐 Run npm audit
        working-directory: mobile-e2e
        run: npm audit --audit-level=moderate || true

      - name: 🔐 OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Smart-Crop-Monitoring'
          path: 'mobile-e2e'
          format: 'JSON'
          args: >
            --enableExperimental
            --scan mobile-e2e

      - name: 📤 Upload Security Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: reports/

  test-count-verification:
    runs-on: ubuntu-latest
    name: Verify 350 Test Cases

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 🔢 Count and Verify Test Cases
        working-directory: mobile-e2e
        run: |
          npm ci
          npm run test
          TOTAL=$(node -e "import fs from 'fs'; const data = JSON.parse(fs.readFileSync('reports/index.json')); console.log(data.stats.tests);")
          echo "========================================="
          echo "Total Test Cases: $TOTAL"
          echo "========================================="
          if [ "$TOTAL" -eq 350 ]; then
            echo "✅ Test count requirement met (exactly 350)"
            exit 0
          else
            echo "❌ Test count mismatch. Required: 350, Found: $TOTAL"
            exit 1
          fi

      - name: 📈 Generate Test Inventory
        working-directory: mobile-e2e
        run: |
          cat > test-inventory.md << 'EOF'
          # Test Cases Inventory
          
          ## Summary
          - **Total Test Cases**: 350
          - **Organized by Module**: Login, Navigation, Chatbot, Farm Profile, Telemetry Sensors, AI Diagnostics, Drone Monitor, Alerts Center
          - **Report Format**: Excel, HTML, JSON
          
          ## Test Breakdown
          
          ### Login Module (50 tests)
          - TC_01 to TC_50: User login session and credentials checks
          
          ### Navigation Module (100 tests)
          - TC_51 to TC_150: View switching and header validation
          
          ### Chatbot Module (100 tests)
          - TC_151 to TC_250: English & Telugu queries
          
          ### Farm Profile Module (50 tests)
          - TC_251 to TC_300: Farmer Rama Rao profile updating
          
          ### Telemetry Sensors Module (25 tests)
          - TC_301 to TC_325: Live IoT sensor updates
          
          ### AI Diagnostics Module (15 tests)
          - TC_326 to TC_340: Leaf scan diagnostics
          
          ### Drone Monitor Module (5 tests)
          - TC_341 to TC_345: Drone visual / NDVI Feed checks
          
          ### Alerts Center Module (5 tests)
          - TC_346 to TC_350: Notification dismissals
          
          EOF
          cat test-inventory.md

      - name: 📤 Upload Test Inventory
        uses: actions/upload-artifact@v4
        with:
          name: test-inventory
          path: mobile-e2e/test-inventory.md

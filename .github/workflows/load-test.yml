name: API Load Testing

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  api-load-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r tests/requirements.txt

      - name: Start Backend Flask Server
        run: |
          python backend/app.py &
        env:
          FLASK_ENV: development

      - name: Wait for Server to Boot
        run: |
          sleep 5
          # Simple healthcheck ping to verify server is running
          curl -I http://localhost:5000/api/health

      - name: Execute API Load Testing
        run: |
          python tests/load_test.py

      - name: Upload Load Test Excel Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-load-test-reports
          path: |
            tests/excel/Load_Test_Report.xlsx
          retention-days: 14

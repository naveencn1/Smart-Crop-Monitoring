name: 🚀 Manual Test Execution

on:
  workflow_dispatch:
    inputs:
      testSuite:
        description: 'Test Suite to Run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - authentication
          - dashboard
          - detection
          - profile
      apiLevel:
        description: 'Android API Level'
        required: true
        default: '30'
        type: choice
        options:
          - '28'
          - '29'
          - '30'
          - '31'
          - '32'
      testType:
        description: 'Test Type'
        required: true
        default: 'fullrun'
        type: choice
        options:
          - fullrun
          - smoke
          - critical
          - regression
      generateReport:
        description: 'Generate Excel Report'
        required: true
        default: true
        type: boolean

jobs:
  manual-test-execution:
    runs-on: ubuntu-latest
    name: Execute Tests - ${{ inputs.testSuite }} (API ${{ inputs.apiLevel }})

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: 📝 Log Test Parameters
        run: |
          echo "📋 Test Execution Parameters:"
          echo "Test Suite: ${{ inputs.testSuite }}"
          echo "Android API: ${{ inputs.apiLevel }}"
          echo "Test Type: ${{ inputs.testType }}"
          echo "Generate Report: ${{ inputs.generateReport }}"

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📥 Install Dependencies
        working-directory: mobile-e2e-framework
        run: npm ci

      - name: 📱 Setup Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.apiLevel }}
          target: default
          arch: x86_64
          profile: Nexus 6P
          cores: 2
          ram: 2048
          script: echo "Emulator ready"

      - name: ☕ Start Appium Server
        run: |
          npx appium --log-level info --port 4723 &
          sleep 5

      - name: 🧪 Run Selected Test Suite
        working-directory: mobile-e2e-framework
        run: |
          SUITE="${{ inputs.testSuite }}"
          if [ "$SUITE" = "all" ]; then
            npm test
          else
            npx mocha --timeout 600000 "./tests/${SUITE}.test.js" --reporter mochawesome --reporter-options reportDir=reports/html,reportFilename=mochawesome,quiet=true,saveJson=true
          fi

      - name: 📊 Generate Excel Report
        if: ${{ inputs.generateReport }}
        working-directory: mobile-e2e-framework
        run: npm run report || true

      - name: 📊 Generate HTML Report
        if: always()
        working-directory: mobile-e2e-framework
        run: |
          echo "📄 Generating HTML report..."
          ls -la reports/html/ || echo "No HTML reports found"

      - name: 📤 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: manual-test-results-api${{ inputs.apiLevel }}-${{ inputs.testSuite }}
          path: |
            mobile-e2e-framework/reports/
            mobile-e2e-framework/excel/
            mobile-e2e-framework/screenshots/
          retention-days: 30

      - name: 📊 Print Test Summary
        if: always()
        working-directory: mobile-e2e-framework
        run: |
          if [ -f reports/html/mochawesome.json ]; then
            echo "📊 Test Execution Summary:"
            node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('reports/html/mochawesome.json', 'utf8'));
            console.log('✅ Passed:', data.stats.passes);
            console.log('❌ Failed:', data.stats.failures);
            console.log('⏭️  Skipped:', data.stats.pending);
            console.log('📊 Total:', data.stats.tests);
            console.log('⏱️  Duration:', (data.stats.duration / 1000).toFixed(2), 'seconds');
            console.log('📈 Success Rate:', ((data.stats.passes / data.stats.tests) * 100).toFixed(2), '%');
            "
          fi

      - name: 🔔 Create Job Summary
        if: always()
        run: |
          echo "## 🧪 Manual Test Execution Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | ${{ inputs.testSuite }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Android API | ${{ inputs.apiLevel }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Type | ${{ inputs.testType }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Report Generated | ${{ inputs.generateReport }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload Excel Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: excel-report-manual-${{ inputs.testSuite }}
          path: mobile-e2e-framework/excel/
          retention-days: 60

  slack-notification:
    runs-on: ubuntu-latest
    name: Send Slack Notification
    needs: manual-test-execution
    if: always()

    steps:
      - name: 📤 Download Artifacts
        uses: actions/download-artifact@v3

      - name: 💬 Send Slack Message
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: |
            🤖 Appium Manual Test Execution
            Suite: ${{ inputs.testSuite }}
            API Level: ${{ inputs.apiLevel }}
            Status: ${{ job.status }}
            Results: Check artifacts
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

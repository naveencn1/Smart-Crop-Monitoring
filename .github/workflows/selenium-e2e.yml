name: Web Selenium E2E Automation

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r tests/requirements.txt

      - name: Start Flask Backend Server
        run: |
          python backend/app.py &
        env:
          FLASK_ENV: development

      - name: Start Static Frontend Server
        run: |
          python -m http.server 8000 --directory frontend &

      - name: Wait for Servers to be Ready
        run: |
          python -c "
          import urllib.request, time
          print('Waiting for Flask backend (port 5000) and Frontend (port 8000) to be online...')
          for i in range(15):
              try:
                  if urllib.request.urlopen('http://localhost:5000/api/health').getcode() == 200:
                      print('Flask backend is ONLINE!')
                      break
              except Exception as e:
                  print(f'Flask backend not ready yet: {e}')
                  time.sleep(1)
          else:
              raise RuntimeError('Flask backend failed to start in time')

          for i in range(15):
              try:
                  if urllib.request.urlopen('http://localhost:8000/').getcode() == 200:
                      print('Frontend server is ONLINE!')
                      break
              except Exception as e:
                  print(f'Frontend server not ready yet: {e}')
                  time.sleep(1)
          else:
              raise RuntimeError('Frontend server failed to start in time')
          "

      - name: Execute E2E Tests
        run: |
          python tests/test_e2e.py

      - name: Upload Excel Test Reports & Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-selenium-test-reports
          path: |
            tests/excel/
          retention-days: 14

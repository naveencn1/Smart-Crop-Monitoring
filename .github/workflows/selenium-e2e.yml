name: Selenium E2E Web Test Automation

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  selenium-e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python Package Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r tests/requirements.txt

      - name: Start Backend Flask Server
        run: |
          python backend/app.py &
        env:
          FLASK_ENV: development

      - name: Start Frontend Static Server
        run: |
          cd frontend
          python -m http.server 8000 &

      - name: Wait for Servers to Boot
        run: |
          sleep 5
          # Simple healthcheck pings to verify servers are running
          curl -I http://localhost:5000/api/health
          curl -I http://localhost:8000/index.html

      - name: Execute Selenium E2E Tests
        run: |
          python tests/test_e2e.py

      - name: Execute API Load Testing
        run: |
          python tests/load_test.py

      - name: Upload Excel Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-web-reports
          path: |
            tests/excel/Web_E2E_Report.xlsx
            tests/excel/Load_Test_Report.xlsx
            tests/excel/screenshots/
          retention-days: 14

[pytest]
# Pytest configuration for SmartCrop Monitoring test suite

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 6.0

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --capture=no
    -ra
    --color=yes
    --durations=10
    --maxfail=5
    -p no:cacheprovider

# Markers for test organization
markers =
    smoke: Smoke tests (quick sanity checks)
    regression: Regression tests (full feature testing)
    critical: Critical functionality tests
    ui: UI and visual element tests
    data_driven: Data-driven parameterized tests
    stress: Stress and load tests
    performance: Performance and timing tests
    integration: Integration tests spanning multiple features

# Test paths
testpaths = tests

# Timeout for individual tests (in seconds)
timeout = 60

# Parallel execution (requires pytest-xdist)
# Run with: pytest -n auto
# Or specify number: pytest -n 4

# Log configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/test_run.log
log_file_level = DEBUG

# Disable warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Retry failed tests
# Requires pytest-retry
# reruns = 2
# reruns_delay = 1

# Report generation (requires pytest-html)
# --html=reports/report.html --self-contained-html

# Xfail behavior
xfail_strict = false
